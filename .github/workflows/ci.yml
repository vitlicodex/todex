name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build and test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: Scripts/test.sh

      - name: Build app bundle
        run: Scripts/make-app-bundle.sh

      - name: Verify app bundle signature
        run: codesign --verify --deep --strict .build/TODEX.app
